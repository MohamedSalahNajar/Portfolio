<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCADIA — Breakout</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="navbar-container">
    <a class="logo" href="../index.html">ARCADIA</a>
    <div style="display: flex; align-items: center; gap: 1.8rem;">
      <ul class="nav-links">
        <li><a href="../index.html#games">← All Games</a></li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme" style="margin: 0; padding: 0;">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-tag">Game 05</div>
  <h1>Breakout</h1>
  <p>Bounce the ball, smash every brick</p>
</div>

<div class="scorebar">
  <div class="scorebar-item">Score <b id="score">0</b></div>
  <div class="scorebar-item">Best <b id="best">0</b></div>
  <div class="scorebar-item">Lives <b id="lives">3</b></div>
  <div class="scorebar-item">Level <b id="level">1</b></div>
</div>

<div class="game-area">
  <div class="game-overlay-wrap">
    <canvas id="canvas" width="400" height="380"></canvas>
    <div class="game-overlay show" id="overlay">
      <h2 id="overlay-title">BREAKOUT</h2>
      <p id="overlay-sub">Press SPACE or tap to start</p>
      <div class="big-score" id="overlay-score" style="display:none"></div>
    </div>
  </div>

  <div class="controls-hint">
    Mouse or ← → keys to move paddle &nbsp;·&nbsp; SPACE to launch / pause
  </div>

  <div class="touch-bar" id="touch-bar">
    <button onclick="movePadLeft()">◀</button>
    <button onclick="handleSpace()">LAUNCH</button>
    <button onclick="movePadRight()">▶</button>
  </div>
</div>

<footer>
  <p>ARCADIA · <a href="../index.html">Back to Hub</a></p>
</footer>

<script src="../theme-setup.js"></script>
<script src="script.js"></script>
<script>
  const nav = document.getElementById('navbar');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 50));
</script>
</body>
</html>
